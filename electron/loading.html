<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yantrik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #bc8cff;
    }

    .logo span {
      color: #58a6ff;
    }

    .status {
      font-size: 12px;
      color: #7d8590;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #30363d;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { background: #30363d; transform: scale(1); }
      40%            { background: #bc8cff; transform: scale(1.3); }
    }

    .hint {
      font-size: 11px;
      color: #484f58;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">यंत्रिक <span>Desktop</span></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status">Starting backend...</div>
    <div class="hint">This takes a few seconds on first launch</div>
  </div>
</body>
</html>
